<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Logs</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<header>
    <h1>Upload Security Log</h1>
</header>

<main>

<div class="card">

<form action="/upload" method="POST" enctype="multipart/form-data">

<input type="file" name="logfile" required>

<br><br>

<button type="submit">
    Upload Log
</button>

</form>

<!-- ADD THE CODE BELOW HERE -->

{% if filename %}
<hr>

<h2>Uploaded File</h2>

<p>{{ filename }}</p>

<h2>Parsed Logs</h2>

<ul>
{% for log in logs %}
    <li>{{ log }}</li>
{% endfor %}
</ul>

{% endif %}

<!-- END OF ADDED CODE -->

</div>

</main>

</body>
</html>
